---
layout: default
title: Home
---

<section>

  <div>
    {% capture about %}{% include main-page.md %}{% endcapture %}
    {{ about| markdownify }}
  </div>

  <div style="font-size:0.8rem">
    <ul>
      {% for post in paginator.posts %}
        <li>
          <a href="{{ post.url }}">{{ post.date | date_to_string }} &middot; {{ post.title }}</a>
        </li>
      {% endfor %}
    </ul>
  </div>

</section>
